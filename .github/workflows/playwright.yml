name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: commandcenter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/commandcenter_test
      SESSION_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
      PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Push database schema
        run: pnpm --filter @workspace/db run push

      - name: Seed products
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({ connectionString: process.env.DATABASE_URL });
          async function seed() {
            await client.connect();
            await client.query(\`
              INSERT INTO products (name, price, category, description) VALUES
              ('Wireless Noise-Cancelling Headphones', 249.99, 'Electronics', 'Premium over-ear headphones with active noise cancellation and 30-hour battery life.'),
              ('Ergonomic Office Chair', 399.00, 'Furniture', 'Lumbar-support mesh chair with adjustable armrests and breathable back panel.'),
              ('Standing Desk Converter', 189.50, 'Furniture', 'Sit-stand desktop converter that fits any existing desk, smooth height adjustment.'),
              ('Mechanical Keyboard', 129.95, 'Electronics', 'Compact 75% layout with Cherry MX switches, RGB backlit, and USB-C cable.'),
              ('4K Webcam', 119.00, 'Electronics', 'Ultra-HD streaming webcam with auto-focus, built-in ring light, and privacy shutter.'),
              ('Notebook Set (3-pack)', 24.99, 'Stationery', 'Dotted hardcover notebooks, A5 size, acid-free paper, 160 pages each.'),
              ('Cable Management Kit', 18.75, 'Accessories', '50-piece kit with velcro straps, cable clips, and adhesive mounts.'),
              ('USB-C Hub (7-in-1)', 59.99, 'Electronics', 'Portable hub with 4K HDMI, 3x USB-A, SD card reader, and 100W pass-through charging.'),
              ('Monitor Light Bar', 44.00, 'Accessories', 'Clip-on LED screen bar with touch dimmer, warm/cool colour range, no screen glare.'),
              ('Desk Plant (Pothos)', 12.50, 'Home & Office', 'Low-maintenance golden pothos in a ceramic pot.'),
              ('Wireless Charging Pad', 34.99, 'Electronics', '15W fast wireless charger, Qi-compatible, ultra-slim with non-slip surface.'),
              ('Blue Light Blocking Glasses', 29.95, 'Accessories', 'Lightweight anti-glare frames that reduce digital eye strain during long screen sessions.')
              ON CONFLICT DO NOTHING
            \`);
            await client.end();
            console.log('Products seeded');
          }
          seed().catch(console.error);
          "

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Start API server
        run: |
          node --enable-source-maps artifacts/api-server/dist/index.mjs &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..20}; do
            if curl -sf http://localhost:8080/api/healthz > /dev/null 2>&1; then
              echo "API server is ready"
              break
            fi
            echo "Waiting for API server... attempt $i"
            sleep 2
          done

      - name: Build frontend
        run: pnpm --filter @workspace/app run build
        env:
          BASE_PATH: /
          PORT: "3000"

      - name: Serve frontend + set up nginx proxy
        run: |
          # Install nginx and serve
          sudo apt-get install -y nginx
          npm install -g serve

          # Serve built frontend on port 3000
          serve -s artifacts/app/dist -l 3000 &
          sleep 2

          # Configure nginx to proxy /api → 8080 and / → 3000
          sudo tee /etc/nginx/sites-available/ci-proxy << 'NGINX'
          server {
            listen 80;
            location /api {
              proxy_pass http://127.0.0.1:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header Cookie $http_cookie;
              proxy_pass_header Set-Cookie;
            }
            location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host $host;
            }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/ci-proxy /etc/nginx/sites-enabled/ci-proxy
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl restart nginx
          sleep 2

          echo "Proxy ready — verifying routes"
          curl -sf http://localhost/api/healthz || (echo "API proxy failed" && exit 1)
          echo "Routes OK"

      - name: Install Playwright browsers
        run: cd tests && pnpm exec playwright install chromium --with-deps

      - name: Run Playwright tests
        run: cd tests && pnpm test
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results/
          retention-days: 7
